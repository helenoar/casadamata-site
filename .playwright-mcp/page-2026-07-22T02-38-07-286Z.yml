      - generic [ref=f1e30]:
        - paragraph [ref=f1e31]: Casa da Mata – uma experiência inesquecível em meio à natureza do Pasárgada
        - paragraph [ref=f1e32]: A Casa da Mata é uma hospedagem em meio à natureza — uma casa contêiner elegante, arejada e acolhedora, pensada para quem busca descanso, conforto e inspiração.
        - paragraph [ref=f1e33]: Entre no ritmo suave da mata e deixe-se envolver pelos sons, pelos cantos dos pássaros, pelos cheiros e silêncios que inspiram presença.
        - heading "O espaço" [level=2] [ref=f1e34]
        - paragraph [ref=f1e35]: A Casa da Mata é cercada por montanhas e árvores frondosas da Mata Atlântica, com águas doces ao redor, além de uma rede na varanda e um redário que convidam a relaxar e se deixar levar pelo balanço.
        - paragraph [ref=f1e36]: Localizada no Condomínio Pasárgada, a apenas 26 km do BH Shopping, sentido Rio de Janeiro, oferece uma experiência segura e acolhedora em meio à natureza.
        - paragraph [ref=f1e37]: Ideal para quem busca se reconectar, caminhar com os pés descalços entre as árvores, sentir a força da natureza — com o aconchego sereno de um lar contemporâneo.
        - paragraph [ref=f1e38]: Aqui, o tempo desacelera, e cada instante convida a viver o essencial.
        - paragraph [ref=f1e39]: Mais que uma hospedagem, a Casa da Mata oferece uma experiência. Cada detalhe foi pensado para unir conforto, natureza e estilo — um refúgio que inspira presença, calma e bem-estar.
        - heading "Acesso do hóspede" [level=2] [ref=f1e40]
        - paragraph [ref=f1e41]: Você terá acesso completo à Casa da Mata, com seu amplo quintal gramado de 1000 m², cercado pela natureza e pelas áreas verdes do condomínio fechado. Todo o entorno externo conta com monitoramento por câmeras, garantindo mais tranquilidade durante a estadia. Disponibilizamos internet de fibra óptica de alta velocidade, ideal para trabalho, lazer ou streaming.
        - heading "Outras observações" [level=2] [ref=f1e42]
        - paragraph [ref=f1e43]: NÃO SÃO PERMITIDAS VISITAS. A portaria é controlada e o acesso ao condomínio é rigorosamente monitorado. As ruas contam com câmeras de vigilância e rondas 24 horas. A entrada é permitida apenas aos hóspedes previamente autorizados pelo anfitrião. O local conta com entregas de aplicativos como iFood e diversos restaurantes nas proximidades.
