        - paragraph [ref=f2e21]: Guia turístico
        - heading "Inhotim, Topo do Mundo e Atrações Turísticas Próximas a Nova Lima, MG" [level=1] [ref=f2e22]
        - paragraph [ref=f2e23]: "Mais de 20 atrações verificadas em um raio de 30 km: museus, trilhas, cachoeiras, gastronomia mineira autêntica e hospedagem regional."
      - img "Casa da Mata em meio à natureza, ponto de partida para explorar atrações turísticas" [ref=f2e25]
    - generic [ref=f2e27]:
      - generic [ref=f2e28]:
        - heading "Quais são as principais atrações turísticas perto de Nova Lima e Macacos?" [level=2] [ref=f2e29]
        - paragraph [ref=f2e30]: A região de Nova Lima e Macacos oferece mais de 20 atrações turísticas verificadas dentro de um raio de 30 km, que vão desde o maior museu a céu aberto do mundo até trilhas de trekking em Mata Atlântica, cachoeiras com piscinas naturais, gastronomia mineira autêntica e hospedagem regional. A Casa da Mata fica no centro dessa região, oferecendo acesso conveniente a todas essas atrações.
        - heading "Instituto Inhotim (Brumadinho, 30 km)" [level=3] [ref=f2e31]
        - paragraph [ref=f2e32]: O Instituto Inhotim é o maior museu a céu aberto do mundo, ocupando 140 hectares com 24 galerias permanentes e mais de 4.300 espécies botânicas. É um destino de turismo cultural de nível internacional, combinando arte contemporânea, natureza e arquitetura de forma única.
        - paragraph [ref=f2e33]:
          - strong [ref=f2e34]: "Por que visitar:"
          - text: Entrada gratuita toda quarta-feira e último domingo de cada mês. As 5 galerias principais — Galpão, Fonte, Praça, Floresta e Arte Contemporânea — oferecem uma experiência imersiva entre arte e natureza. O museu é reconhecido pela UNESCO e atrai visitantes do mundo todo.
        - paragraph [ref=f2e35]:
          - strong [ref=f2e36]: "Dica:"
          - text: Reserve pelo menos meio dia para explorar Inhotim. Leve água, protetor solar e sapatos confortáveis. A melhor época é de abril a outubro.
        - heading "Topo do Mundo / Serra da Moeda (20 km)" [level=3] [ref=f2e37]
        - paragraph [ref=f2e38]: A Serra da Moeda, conhecida localmente como Topo do Mundo, oferece uma trilha de 6 km com subida de 1.500 metros de altitude. É uma das trilhas mais acessíveis com vistas panorâmicas mais espetaculares de Minas Gerais, com visibilidade de até 50 km em dias claros.
        - paragraph [ref=f2e39]:
          - strong [ref=f2e40]: "Por que visitar:"
          - text: Vistas de 360 graus da Grande Belo Horizonte. A Serra da Moeda é zona de voo livre estabelecida, e em dias ensolarados você pode ver parapentes e asa-deltas sobrevoando a região. A vegetação de cerrado e campos de altitude oferece uma experiência de montanha preservada.
        - paragraph [ref=f2e41]:
          - strong [ref=f2e42]: "Dica:"
          - text: "Comece a trilha cedo para aproveitar melhor a visibilidade. Melhor época: abril a outubro."
        - heading "Trilhas em Mata Atlântica" [level=3] [ref=f2e43]
        - heading "Trilha Ribeirão dos Macacos (2 km, nível fácil)" [level=4] [ref=f2e44]
        - paragraph [ref=f2e45]: Localizada logo ao lado da Casa da Mata, dentro do Condomínio Pasárgada, essa trilha acompanha o Ribeirão dos Macacos em meio à Mata Atlântica. É ideal para iniciantes e oferece uma imersão na floresta local.
        - heading "Trilha Vale do Sol (6 km, nível fácil)" [level=4] [ref=f2e46]
        - paragraph [ref=f2e47]: Trilha de fácil acesso atravessando o bairro Vale do Sol, com vegetação de cerrado e mata, oferecendo vistas panorâmicas da região. Acessível para famílias.
        - heading "Trilha Cachoeira Marumbé (10 km, nível moderado)" [level=4] [ref=f2e48]
        - paragraph [ref=f2e49]: Trilha que passa pela região histórica de Macacos e leva a uma cachoeira em ambiente de floresta nativa. É uma oportunidade de conhecer o bairro histórico durante o percurso.
        - heading "Trilha BH × Macacos (25 km, nível avançado)" [level=4] [ref=f2e50]
        - paragraph [ref=f2e51]: Uma das maiores trilhas de trekking da Grande BH, percorrendo aproximadamente 25 km imerso em Mata Atlântica praticamente intocada. Requer preparação adequada e é ideal para trekkers experientes.
        - heading "Trilha Perdidas (15 km, mountain biking)" [level=4] [ref=f2e52]
        - paragraph [ref=f2e53]: Popular entre praticantes de mountain biking, com trechos técnicos e desafiadores. Oferece vistas panorâmicas do entorno de Nova Lima em ambiente de cerrado e mata.
        - heading "Cachoeiras e Piscinas Naturais" [level=3] [ref=f2e54]
        - heading "Cachoeira dos Macacos (17 km)" [level=4] [ref=f2e55]
        - paragraph [ref=f2e56]: Cachoeira com piscina natural de águas cristalinas, localizada em meio à mata atlântica. É popular entre turistas e visitantes de fim de semana.
        - heading "Cachoeira Marumbé (10 km)" [level=4] [ref=f2e57]
        - paragraph [ref=f2e58]: Cachoeira localizada em ambiente de floresta nativa, com trilha que passa pela região histórica de Macacos. Nível moderado de dificuldade.
        - heading "Cachoeira da Ponte (12 km)" [level=4] [ref=f2e59]
        - paragraph [ref=f2e60]: Cachoeira com piscina natural cercada de vegetação nativa, com trilha de acesso de nível moderado. Destino popular entre visitantes locais.
        - heading "Gastronomia Mineira Autêntica" [level=3] [ref=f2e61]
        - heading "Restaurante Mar Mineiro (8 km)" [level=4] [ref=f2e62]
        - paragraph [ref=f2e63]: Restaurante de gastronomia mineira autêntica localizado em Macacos, oferecendo pratos tradicionais com vistas panorâmicas de montanha. Ponto de referência gastronômico da região.
        - heading "Bar do Marcinho (5 km)" [level=4] [ref=f2e64]
        - paragraph [ref=f2e65]: Bar tradicional em Macacos, estabelecimento desde 1995, servindo comida mineira autêntica. É um ponto de encontro dos moradores locais, com ambiente acolhedor e descontraído.
        - heading "Sítio Bar (6 km)" [level=4] [ref=f2e66]
        - paragraph [ref=f2e67]: Bar especializado em peixe defumado grelhado na folha de bananeira — uma receita tradicional mineira única. Ambiente rústico e acolhedor.
        - heading "Bairros Históricos" [level=3] [ref=f2e68]
        - heading "Macacos (São Sebastião das Águas Claras) — 3 km" [level=4] [ref=f2e69]
        - paragraph [ref=f2e70]: Distrito histórico de Nova Lima com arquitetura colonial preservada, cappela de São Sebastião do século XVIII, e gastronomia mineira autêntica. É o centro cultural e histórico da região, referência importante para turismo.
        - heading "Vale do Sol — 6 km" [level=4] [ref=f2e71]
        - paragraph [ref=f2e72]: Bairro turístico de Nova Lima com infraestrutura de hospedagem, natureza preservada e vegetação de cerrado. É destino de segunda casa para visitantes de Belo Horizonte.
        - heading "Outras Atrações" [level=3] [ref=f2e73]
        - heading "Gruta do Rei Momo (22 km, Brumadinho)" [level=4] [ref=f2e74]
        - paragraph [ref=f2e75]: Caverna histórica com formações geológicas interessantes e trilha de acesso. Atração complementar a visitas a Inhotim.
        - heading "Praia Artificial de Nova Lima (8 km)" [level=4] [ref=f2e76]
        - paragraph [ref=f2e77]: Lagoa artificial com praia em Nova Lima, oferecendo banho e lazer em água doce próximo à zona urbana.
        - heading "Qual é a melhor época de visita?" [level=2] [ref=f2e78]
        - paragraph [ref=f2e79]:
          - text: A melhor época para explorar as atrações da região é
          - strong [ref=f2e80]: de abril a outubro
          - text: ", quando há menor índice de chuvas e as condições de visibilidade são melhores. As trilhas ficam mais seguras, as cachoeiras têm água em quantidade apropriada, e as vistas panorâmicas (especialmente no Topo do Mundo) são mais claras."
        - heading "Sua Base Perfeita para Explorar" [level=2] [ref=f2e81]
        - paragraph [ref=f2e82]:
          - text: A
          - strong [ref=f2e83]: Casa da Mata
          - text: é a opção ideal para usar como base e explorar essas atrações. Localizada a apenas 3 km de Macacos e 26 km do BH Shopping, oferece self check-in por cofre de chaves, 1000 m² de área externa privativa, fogo de chão e redário — perfeito para quem quer privacidade e conforto em meio à natureza enquanto explora a região.
        - paragraph [ref=f2e84]:
          - text: Para mais informações sobre hospedagem, consulte o guia
          - link "Onde ficar hospedado perto de Nova Lima e Macacos, MG?" [ref=f2e85] [cursor=pointer]:
            - /url: /hospedagem-nova-lima-e-macacos
          - text: .
        - heading "Como Chegar" [level=2] [ref=f2e86]
        - paragraph [ref=f2e87]: A região é acessível a partir de Belo Horizonte via sentido Rio de Janeiro (BR-040), com indicações para Nova Lima e Macacos. A Casa da Mata oferece self check-in, permitindo chegada flexível sem necessidade de combinar horários com o anfitrião.
